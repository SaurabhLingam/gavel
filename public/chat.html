<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .chat-page {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        /* Header strip */
        .chat-header-card {
            background: var(--parchment);
            border: 2px solid var(--brass-gold);
            border-radius: 4px 4px 0 0;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .chat-header-card .lot-info h2 {
            font-family: 'Montserrat', sans-serif;
            color: var(--deep-oak);
            margin: 0 0 4px;
            font-size: 1.3rem;
            text-transform: uppercase;
        }
        .chat-header-card .lot-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #8b6f5b;
            font-style: italic;
        }
        .chat-with-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            border: 1px solid #c4b4a5;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.85rem;
            color: var(--deep-oak);
            font-weight: bold;
        }
        .chat-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(145deg, var(--brass-gold), #b8860b);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--polished-walnut);
            font-weight: bold;
            font-size: 0.85rem;
        }

        /* Message window */
        .chat-window {
            background: white;
            border-left: 2px solid var(--brass-gold);
            border-right: 2px solid var(--brass-gold);
            height: 480px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-window::-webkit-scrollbar { width: 6px; }
        .chat-window::-webkit-scrollbar-thumb { background: #c4b4a5; border-radius: 3px; }

        /* Individual messages */
        .msg-row {
            display: flex;
            flex-direction: column;
            max-width: 72%;
        }
        .msg-row.mine  { align-self: flex-end; align-items: flex-end; }
        .msg-row.theirs { align-self: flex-start; align-items: flex-start; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-row.mine  .msg-bubble {
            background: linear-gradient(135deg, var(--brass-gold), #b8860b);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-row.theirs .msg-bubble {
            background: var(--white-oak);
            color: var(--deep-oak);
            border: 1px solid #e0d6c3;
            border-bottom-left-radius: 4px;
        }
        .msg-meta {
            font-size: 0.72rem;
            color: #aaa;
            margin-top: 4px;
            padding: 0 4px;
        }

        /* Date divider */
        .date-divider {
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
            position: relative;
            margin: 8px 0;
        }
        .date-divider::before, .date-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #e0d6c3;
        }
        .date-divider::before { left: 0; }
        .date-divider::after  { right: 0; }

        /* Empty state */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8b6f5b;
            font-style: italic;
            gap: 10px;
            padding: 40px;
            text-align: center;
        }
        .chat-empty .gavel-icon { font-size: 2.5rem; }

        /* Typing indicator */
        .typing-indicator {
            font-size: 0.8rem;
            color: #aaa;
            padding: 0 20px 8px;
            background: white;
            border-left: 2px solid var(--brass-gold);
            border-right: 2px solid var(--brass-gold);
            min-height: 24px;
            font-style: italic;
        }

        /* Input bar */
        .chat-input-bar {
            background: var(--parchment);
            border: 2px solid var(--brass-gold);
            border-top: none;
            border-radius: 0 0 4px 4px;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input-bar textarea {
            flex: 1;
            border: 1px solid #c4b4a5;
            border-radius: 20px;
            padding: 10px 18px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.4;
            background: white;
        }
        .chat-input-bar textarea:focus { border-color: var(--brass-gold); }
        .send-btn {
            width: 44px; height: 44px;
            background: linear-gradient(145deg, var(--brass-gold), #b8860b);
            border: none; border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.1); }
        .send-btn svg { width: 18px; height: 18px; fill: white; }

        /* Access denied state */
        .access-denied {
            text-align: center;
            padding: 80px 20px;
            color: #8b6f5b;
        }
        .access-denied h2 { color: var(--deep-oak); font-family: 'Montserrat', sans-serif; }

        /* Connection status */
        .conn-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #aaa;
        }
        .conn-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #ccc;
        }
        .conn-dot.online  { background: #27ae60; }
        .conn-dot.offline { background: #e74c3c; }

        @media (max-width: 600px) {
            .chat-header-card { flex-direction: column; align-items: flex-start; }
            .chat-window { height: 360px; }
            .msg-row { max-width: 88%; }
        }
    </style>
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                <span>Gavel</span>
            </a>
        </div>
        <ul class="nav-links"><!-- Populated by nav.js --></ul>
    </nav>
</header>

<div class="chat-page">
    <div id="chat-ui" style="display:none;">
        <!-- Header -->
        <div class="chat-header-card">
            <div class="lot-info">
                <h2 id="chat-auction-title">Loading...</h2>
                <p id="chat-subtitle">Private conversation</p>
            </div>
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <div class="chat-with-badge">
                    <div class="chat-avatar" id="other-avatar">?</div>
                    <span id="other-name">...</span>
                </div>
                <span class="conn-status">
                    <span class="conn-dot" id="conn-dot"></span>
                    <span id="conn-label">Connecting...</span>
                </span>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-window" id="chat-window">
            <div class="chat-empty">
                <div class="gavel-icon">🔨</div>
                <p>No messages yet.<br>Start the conversation to discuss the transaction.</p>
            </div>
        </div>

        <!-- Typing indicator row -->
        <div class="typing-indicator" id="typing-indicator"></div>

        <!-- Input -->
        <div class="chat-input-bar">
            <textarea id="msg-input" rows="1" placeholder="Type a message..." maxlength="2000"></textarea>
            <button class="send-btn" id="send-btn" title="Send">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <div id="access-error" style="display:none;" class="access-denied">
        <h2>Access Restricted</h2>
        <p id="access-error-msg">You do not have access to this chat.</p>
        <a href="/my-products.html" class="btn-primary" style="display:inline-block; margin-top:20px;">My Products</a>
    </div>
</div>

<footer><p>&copy; 2026 Gavel. All rights reserved.</p></footer>

<script src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const params    = new URLSearchParams(window.location.search);
    const auctionId = Number(params.get('auction'));

    if (!auctionId) { showError('No auction specified.'); return; }

    // Auth check
    let currentUser = null;
    try {
        const me = await fetch('/api/me');
        const md = await me.json();
        if (!md.loggedIn) { window.location.href = `/login.html?redirect=/chat.html?auction=${auctionId}`; return; }
        currentUser = md.user;
    } catch(e) { showError('Could not connect to server.'); return; }

    // Load chat history + metadata
    let chatData = null;
    try {
        const res = await fetch(`/api/chat/${auctionId}`);
        if (!res.ok) {
            const err = await res.json();
            showError(err.message || 'Access denied.');
            return;
        }
        chatData = await res.json();
    } catch(e) { showError('Failed to load chat.'); return; }

    // Render UI
    document.getElementById('chat-ui').style.display = 'block';
    document.getElementById('chat-auction-title').textContent = chatData.auctionTitle;
    document.getElementById('chat-subtitle').textContent      =
        `Private chat with ${chatData.otherName}`;
    document.getElementById('other-name').textContent         = chatData.otherName;
    document.getElementById('other-avatar').textContent       = chatData.otherName.charAt(0).toUpperCase();

    // Render existing messages
    renderMessages(chatData.messages, currentUser.email);

    // ── WebSocket ──
    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${protocol}://${location.host}`);
    const connDot   = document.getElementById('conn-dot');
    const connLabel = document.getElementById('conn-label');

    ws.addEventListener('open', () => {
        connDot.className   = 'conn-dot online';
        connLabel.textContent = 'Connected';
        ws.send(JSON.stringify({
            type:      'join_chat',
            auctionId: auctionId,
            email:     currentUser.email,
            name:      currentUser.name
        }));
    });

    ws.addEventListener('close', () => {
        connDot.className   = 'conn-dot offline';
        connLabel.textContent = 'Disconnected';
    });

    ws.addEventListener('message', (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'chat_msg' && msg.auctionId === auctionId) {
            appendMessage(msg, currentUser.email);
        }
    });

    // ── Send message ──
    const input   = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        input.style.height = 'auto';

        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'chat_msg', auctionId, text }));
        } else {
            // Fallback to HTTP POST if WS disconnected
            fetch(`/api/chat/${auctionId}`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ message: text })
            }).then(r => r.json()).then(data => {
                if (data.message) appendMessage({ ...data.message, senderEmail: currentUser.email }, currentUser.email);
            });
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Auto-resize textarea
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
});

// ── Render helpers ──
let lastDateLabel = null;

function renderMessages(messages, myEmail) {
    const window_ = document.getElementById('chat-window');
    if (!messages.length) return; // keep empty state
    window_.innerHTML = '';
    lastDateLabel = null;
    messages.forEach(m => appendMessage(m, myEmail, false));
    scrollToBottom();
}

function appendMessage(msg, myEmail, scroll = true) {
    const window_ = document.getElementById('chat-window');

    // Remove empty state if present
    const empty = window_.querySelector('.chat-empty');
    if (empty) empty.remove();

    // Date divider
    const dateLabel = new Date(msg.sentAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
    if (dateLabel !== lastDateLabel) {
        lastDateLabel = dateLabel;
        const divider = document.createElement('div');
        divider.className   = 'date-divider';
        divider.textContent = dateLabel;
        window_.appendChild(divider);
    }

    const isMine = msg.senderEmail === myEmail;
    const row = document.createElement('div');
    row.className = `msg-row ${isMine ? 'mine' : 'theirs'}`;

    const time = new Date(msg.sentAt).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

    row.innerHTML = `
        <div class="msg-bubble">${escapeHtml(msg.message)}</div>
        <div class="msg-meta">${isMine ? 'You' : escapeHtml(msg.senderName)} · ${time}</div>`;

    window_.appendChild(row);
    if (scroll) scrollToBottom();
}

function scrollToBottom() {
    const w = document.getElementById('chat-window');
    w.scrollTop = w.scrollHeight;
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function showError(msg) {
    document.getElementById('access-error').style.display = 'block';
    document.getElementById('access-error-msg').textContent = msg;
}
</script>
</body>
</html>
