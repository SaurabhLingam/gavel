<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Profile | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 1000px; margin: 50px auto; padding: 20px;
            display: grid; grid-template-columns: 300px 1fr; gap: 30px;
        }
        .profile-sidebar {
            background: var(--parchment); padding: 30px;
            border: 2px solid var(--brass-gold); border-radius: 4px;
            height: fit-content; text-align: center;
        }
        .profile-pic {
            width: 120px; height: 120px; background: var(--deep-oak);
            border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--parchment); font-size: 3rem;
            border: 4px solid var(--brass-gold);
        }
        .profile-main {
            background: white; padding: 40px; border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: var(--white-oak); padding: 20px;
            text-align: center; border-bottom: 3px solid var(--brass-gold);
        }
        .stat-card h4 { margin: 0; color: #8b6f5b; font-size: 0.8rem; text-transform: uppercase; }
        .stat-card p  { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: var(--polished-walnut); }

        .activity-log h3 {
            border-bottom: 2px solid var(--white-oak); padding-bottom: 10px;
            margin-bottom: 20px; color: var(--deep-oak);
        }
        .activity-item {
            padding: 15px; border-left: 4px solid var(--brass-gold);
            background: #fafafa; margin-bottom: 10px;
            border-radius: 0 4px 4px 0;
        }
        .activity-item.won { border-left-color: #27ae60; background: #f0fff4; }
        .activity-item-top {
            display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
        }
        .activity-item .item-title { font-weight: bold; color: var(--polished-walnut); }
        .activity-item .item-amount { color: #27ae60; font-weight: bold; white-space: nowrap; }
        .activity-item .item-time { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        .activity-item .item-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-chat {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 4px; font-size: 0.8rem;
            font-weight: bold; text-decoration: none; text-transform: uppercase;
            background: linear-gradient(135deg, var(--deep-oak), var(--polished-walnut));
            color: var(--brass-gold); border: 1px solid var(--brass-gold);
            transition: opacity 0.2s;
        }
        .btn-chat:hover { opacity: 0.85; }
        .btn-view {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 4px; font-size: 0.8rem;
            font-weight: bold; text-decoration: none; text-transform: uppercase;
            background: var(--brass-gold); color: var(--polished-walnut);
            transition: opacity 0.2s;
        }
        .btn-view:hover { opacity: 0.85; }

        .won-tag {
            font-size: 0.7rem; background: #27ae60; color: white;
            padding: 2px 7px; border-radius: 3px; font-weight: bold;
            display: inline-block; margin-left: 6px; vertical-align: middle;
        }
        .closed-tag {
            font-size: 0.7rem; background: var(--deep-oak); color: var(--brass-gold);
            padding: 2px 7px; border-radius: 3px; font-weight: bold;
            display: inline-block; margin-left: 6px; vertical-align: middle;
        }

        @media (max-width: 700px) {
            .profile-container { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links"><!-- Populated by nav.js --></ul>
        </nav>
    </header>

    <div class="profile-container">
        <aside class="profile-sidebar">
            <div class="profile-pic" id="user-initial">?</div>
            <h2 id="user-name">Loading...</h2>
            <p id="user-role" style="font-style:italic; color:#8b6f5b; text-transform:capitalize;">—</p>
            <hr style="border:0; border-top:1px solid #c4b4a5; margin:20px 0;">
            <p id="user-email" style="font-size:0.9rem;">—</p>
            <p id="user-since" style="font-size:0.8rem; color:#aaa;">—</p>
            <a href="/sell-product.html" class="btn-primary"
               style="display:block; width:100%; margin-top:20px; font-size:0.8rem;
                      text-align:center; box-sizing:border-box;">
                List an Item
            </a>
        </aside>

        <main class="profile-main">
            <div class="stats-grid">
                <div class="stat-card"><h4>Active Bids</h4><p id="stat-bids">—</p></div>
                <div class="stat-card"><h4>Auctions Won</h4><p id="stat-won">—</p></div>
                <div class="stat-card"><h4>My Listings</h4><p id="stat-listings">—</p></div>
                <div class="stat-card"><h4>Total Bids Placed</h4><p id="stat-total-bids">—</p></div>
                <div class="stat-card"><h4>Closed Listings</h4><p id="stat-closed">—</p></div>
                <div class="stat-card">
                    <h4>Member Since</h4>
                    <p id="stat-since" style="font-size:0.9rem;">—</p>
                </div>
            </div>

            <div class="activity-log">
                <h3>My Recent Bids</h3>
                <div id="activity-list">
                    <p style="color:#8b6f5b;">Loading activity...</p>
                </div>
            </div>
        </main>
    </div>

    <footer><p>&copy; 2026 Gavel. All rights reserved.</p></footer>

    <script src="js/nav.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {

        // Auth guard
        let currentUser = null;
        try {
            const meRes  = await fetch('/api/me');
            const meData = await meRes.json();
            if (!meData.loggedIn) { window.location.href = '/login.html'; return; }
            currentUser = meData.user;
        } catch(e) { window.location.href = '/login.html'; return; }

        // Load profile stats
        try {
            const res     = await fetch('/api/profile');
            const profile = await res.json();

            document.getElementById('user-initial').textContent = profile.fullname.charAt(0).toUpperCase();
            document.getElementById('user-name').textContent    = profile.fullname;
            document.getElementById('user-role').textContent    = profile.role;
            document.getElementById('user-email').textContent   = profile.email;
            document.getElementById('user-since').textContent   =
                'Member since ' + new Date(profile.created_at).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

            document.getElementById('stat-bids').textContent       = profile.activeBids;
            document.getElementById('stat-won').textContent        = profile.auctionsWon;
            document.getElementById('stat-listings').textContent   = profile.activeListings;
            document.getElementById('stat-total-bids').textContent = profile.totalBids;
            document.getElementById('stat-closed').textContent     = profile.closedListings;
            document.getElementById('stat-since').textContent      =
                new Date(profile.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
        } catch(e) {
            console.error('Profile load error', e);
        }

        // Load bid history — with chat button for won auctions
        try {
            const res    = await fetch('/api/my-bids');
            const bids   = await res.json();
            const listEl = document.getElementById('activity-list');

            if (!bids.length) {
                listEl.innerHTML = '<p style="color:#8b6f5b;">No bids placed yet. <a href="/auction.html">Browse auctions</a></p>';
                return;
            }

            const myEmail = currentUser.email;

            listEl.innerHTML = bids.map(b => {
                const isClosed  = b.auctionStatus === 'closed';
                const isWinner  = isClosed && b.winner_email === myEmail;

                // Status tag
                const statusTag = isClosed
                    ? (isWinner
                        ? `<span class="won-tag">WON</span>`
                        : `<span class="closed-tag">CLOSED</span>`)
                    : '';

                // Action buttons
                const viewBtn = `<a href="/item-detail.html?id=${b.auctionId}" class="btn-view">View Auction</a>`;
                const chatBtn = isWinner
                    ? `<a href="/chat.html?auction=${b.auctionId}" class="btn-chat">💬 Chat with Seller</a>`
                    : '';

                return `
                    <div class="activity-item ${isWinner ? 'won' : ''}">
                        <div class="activity-item-top">
                            <div>
                                <div class="item-title">${b.auctionTitle}${statusTag}</div>
                                <div class="item-time">${new Date(b.placed_at).toLocaleString('en-IN')}</div>
                            </div>
                            <div class="item-amount">₹${Number(b.amount).toLocaleString('en-IN')}</div>
                        </div>
                        ${(viewBtn || chatBtn) ? `
                        <div class="item-actions">
                            ${viewBtn}
                            ${chatBtn}
                        </div>` : ''}
                    </div>`;
            }).join('');

        } catch(e) {
            console.error('Bids load error', e);
        }
    });
    </script>
</body>
</html>
