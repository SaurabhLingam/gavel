<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Profile | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .profile-sidebar {
            background: var(--parchment);
            padding: 30px;
            border: 2px solid var(--brass-gold);
            border-radius: 4px;
            height: fit-content;
            text-align: center;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            background: var(--deep-oak);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--parchment);
            font-size: 3rem;
            border: 4px solid var(--brass-gold);
        }

        .profile-main {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white-oak);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--brass-gold);
        }

        .stat-card h4 { margin: 0; color: #8b6f5b; font-size: 0.8rem; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: var(--polished-walnut); }

        .activity-log h3 {
            border-bottom: 2px solid var(--white-oak);
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--deep-oak);
        }

        .activity-item {
            padding: 15px;
            border-left: 4px solid var(--brass-gold);
            background: #fafafa;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="auction.html">Auctions</a></li>
                <li><a href="sell.html">Sell Item</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </nav>
    </header>

    <div class="profile-container">
        <aside class="profile-sidebar">
            <div class="profile-pic" id="user-initial">U</div>
            <h2 id="user-name">Loading...</h2>
            <p id="user-role" style="font-style: italic; color: #8b6f5b;">Role</p>
            <hr style="border: 0; border-top: 1px solid #c4b4a5; margin: 20px 0;">
            <p id="user-email" style="font-size: 0.9rem;">email@example.com</p>
            <button class="btn-primary" style="width: 100%; margin-top: 20px; font-size: 0.8rem;">Edit Profile</button>
        </aside>

        <main class="profile-main">
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Active Bids</h4>
                    <p id="stat-bids">0</p>
                </div>
                <div class="stat-card">
                    <h4>Won Items</h4>
                    <p id="stat-won">0</p>
                </div>
                <div class="stat-card">
                    <h4>Trust Score</h4>
                    <p>98%</p>
                </div>
            </div>

            <div class="activity-log">
                <h3>Recent Activity</h3>
                <div id="activity-list">
                    <p style="color: #8b6f5b;">No recent activity found in the house.</p>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 Gavel. All rights reserved.</p>
    </footer>

    <script>
        // Temporary placeholder logic for In-Memory data
        // In a real app, this would fetch from /api/profile
        document.addEventListener('DOMContentLoaded', () => {
            // Simulated user session for now
            const user = {
                name: "Guest Member",
                role: "Bidder",
                email: "member@gavel.com",
                bids: 5,
                won: 2
            };

            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-role').textContent = user.role;
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('user-initial').textContent = user.name.charAt(0);
            document.getElementById('stat-bids').textContent = user.bids;
            document.getElementById('stat-won').textContent = user.won;
        });
    </script>
</body>
</html>
