<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .chats-page {
            max-width: 700px;
            margin: 50px auto;
            padding: 0 20px 80px;
        }

        .chats-page h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--deep-oak);
            text-transform: uppercase;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .chats-page .subtitle {
            color: #8b6f5b;
            font-style: italic;
            margin-bottom: 40px;
        }

        /* Individual conversation row */
        .chat-row {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 20px;
            background: white;
            border: 1px solid #e0d6c3;
            border-radius: 6px;
            margin-bottom: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            position: relative;
        }
        .chat-row:hover {
            border-color: var(--brass-gold);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }
        .chat-row.has-unread {
            border-left: 4px solid var(--brass-gold);
            background: #fffdf5;
        }

        /* Thumbnail */
        .chat-thumb {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
            border: 2px solid #e0d6c3;
            flex-shrink: 0;
        }

        /* Avatar for other party */
        .chat-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--brass-gold), #b8860b);
            color: var(--polished-walnut);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem;
            flex-shrink: 0;
            border: 2px solid var(--parchment);
            margin-left: -12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .chat-body {
            flex: 1;
            min-width: 0;
        }
        .chat-body .chat-title {
            font-weight: bold;
            color: var(--polished-walnut);
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-body .chat-with {
            font-size: 0.82rem;
            color: #8b6f5b;
            margin: 2px 0 6px;
        }
        .chat-body .chat-preview {
            font-size: 0.87rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-body .chat-preview.unread-preview {
            color: var(--deep-oak);
            font-weight: bold;
        }
        .chat-body .no-messages {
            font-size: 0.82rem;
            color: #bbb;
            font-style: italic;
        }

        /* Right side: time + badge */
        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
        .chat-time {
            font-size: 0.75rem;
            color: #aaa;
        }
        .unread-badge {
            background: #e74c3c;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 12px;
            padding: 2px 7px;
            min-width: 20px;
            text-align: center;
        }
        .role-pill {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .role-pill.seller { background: var(--parchment); color: var(--deep-oak); border: 1px solid #c4b4a5; }
        .role-pill.winner { background: #f0fff4; color: #27ae60; border: 1px solid #27ae60; }

        /* Empty state */
        .empty-chats {
            text-align: center;
            padding: 80px 20px;
            color: #8b6f5b;
        }
        .empty-chats .icon { font-size: 3rem; margin-bottom: 20px; }
        .empty-chats h3 { font-family: 'Montserrat', sans-serif; color: var(--deep-oak); margin-bottom: 10px; }
        .empty-chats p { font-style: italic; margin-bottom: 30px; }

        /* Winning bid chip */
        .winning-chip {
            font-size: 0.75rem;
            background: var(--white-oak);
            border: 1px solid #c4b4a5;
            border-radius: 3px;
            padding: 2px 7px;
            color: var(--polished-walnut);
            font-weight: bold;
            display: inline-block;
            margin-top: 3px;
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                <span>Gavel</span>
            </a>
        </div>
        <ul class="nav-links"><!-- Populated by nav.js --></ul>
    </nav>
</header>

<div class="chats-page">
    <h1>💬 Messages</h1>
    <p class="subtitle">Private conversations with your auction counterparts.</p>
    <div id="chats-list">
        <p style="color:#8b6f5b; text-align:center; padding:40px;">Loading...</p>
    </div>
</div>

<footer><p>&copy; 2026 Gavel. All rights reserved.</p></footer>

<script src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {

    // Auth check
    try {
        const me = await fetch('/api/me');
        const md = await me.json();
        if (!md.loggedIn) { window.location.href = '/login.html'; return; }
    } catch(e) {
        window.location.href = '/login.html';
        return;
    }

    const listEl = document.getElementById('chats-list');

    try {
        const res   = await fetch('/api/my-chats');
        const chats = await res.json();

        if (!chats.length) {
            listEl.innerHTML = `
                <div class="empty-chats">
                    <div class="icon">🔨</div>
                    <h3>No Conversations Yet</h3>
                    <p>Chats open automatically when an auction you sold or won closes with a winning bid.</p>
                    <a href="/auction.html" class="btn-primary" style="display:inline-block;">Browse Auctions</a>
                </div>`;
            return;
        }

        listEl.innerHTML = '';

        chats.forEach(chat => {
            const hasUnread = chat.unread > 0;
            const a = document.createElement('a');
            a.href      = `/chat.html?auction=${chat.auctionId}`;
            a.className = `chat-row${hasUnread ? ' has-unread' : ''}`;

            // Preview text
            let previewHtml = '';
            if (chat.lastMessage) {
                const isMe    = chat.lastMessage.senderName === chat.otherName ? false : true;
                const preview = chat.lastMessage.message.replace(/\n/g, ' ').slice(0, 60) +
                                (chat.lastMessage.message.length > 60 ? '…' : '');
                previewHtml = `<div class="chat-preview ${hasUnread ? 'unread-preview' : ''}">
                    ${isMe ? '<span style="color:#aaa;">You: </span>' : ''}${escapeHtml(preview)}
                </div>`;
            } else {
                previewHtml = `<div class="no-messages">No messages yet — start the conversation</div>`;
            }

            // Time label
            const timeLabel = chat.lastMessage
                ? formatRelativeTime(chat.lastMessage.sentAt)
                : '';

            a.innerHTML = `
                <img class="chat-thumb" src="${chat.auctionImage}" alt="${chat.auctionTitle}">
                <div class="chat-avatar">${chat.otherName.charAt(0).toUpperCase()}</div>
                <div class="chat-body">
                    <div class="chat-title">${escapeHtml(chat.auctionTitle)}</div>
                    <div class="chat-with">
                        with <strong>${escapeHtml(chat.otherName)}</strong>
                        &nbsp;<span class="role-pill ${chat.myRole}">${chat.myRole === 'seller' ? 'You sold' : 'You won'}</span>
                    </div>
                    ${chat.winningBid ? `<span class="winning-chip">₹${Number(chat.winningBid).toLocaleString('en-IN')}</span>` : ''}
                    ${previewHtml}
                </div>
                <div class="chat-meta">
                    ${timeLabel ? `<span class="chat-time">${timeLabel}</span>` : ''}
                    ${hasUnread ? `<span class="unread-badge">${chat.unread > 99 ? '99+' : chat.unread}</span>` : ''}
                </div>
            `;

            listEl.appendChild(a);
        });

    } catch(e) {
        console.error(e);
        listEl.innerHTML = '<p style="text-align:center; color:#e74c3c; padding:40px;">Failed to load conversations.</p>';
    }
});

function formatRelativeTime(isoString) {
    const now  = Date.now();
    const then = new Date(isoString).getTime();
    const diff = now - then;

    const minutes = Math.floor(diff / 60000);
    const hours   = Math.floor(diff / 3600000);
    const days    = Math.floor(diff / 86400000);

    if (minutes < 1)  return 'Just now';
    if (minutes < 60) return `${minutes}m ago`;
    if (hours < 24)   return `${hours}h ago`;
    if (days < 7)     return `${days}d ago`;
    return new Date(isoString).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

</body>
</html>
