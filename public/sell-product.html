<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Your Item | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .sell-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            min-height: 100vh;
        }

        .sell-card {
            background: var(--parchment);
            padding: 50px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 2px solid var(--brass-gold);
            width: 100%;
            max-width: 700px;
        }

        .sell-card h2 {
            font-family: 'Montserrat', sans-serif;
            color: var(--deep-oak);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .sell-subtitle {
            text-align: center;
            color: #8b6f5b;
            font-style: italic;
            margin-bottom: 40px;
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .form-group label {
            display: block;
            font-weight: bold;
            color: var(--deep-oak);
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #c4b4a5;
            border-radius: 4px;
            background: rgba(255,255,255,0.6);
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group textarea { height: 120px; resize: none; }

        .sell-btn {
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="auction.html">Auctions</a></li>
                <li class="nav-profile">
                    <a href="profile.html" class="nav-avatar-initial" id="nav-avatar">G</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="sell-container">
        <div class="sell-card">
            <h2>Consign Your Item</h2>
            <span class="sell-subtitle">Submit your lot for verification.</span>
            
            <form action="/api/sell" method="POST" enctype="multipart/form-data" class="form-grid">
                <div class="form-group full-width">
                    <label>Item Title</label>
                    <input type="text" name="title" required>
                </div>

                <div class="form-group">
                    <label>Starting Bid (₹)</label>
                    <input type="number" name="price" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" name="category">
                </div>

                <div class="form-group">
                    <label>Cover Photo (Image)</label>
                    <input type="file" name="image" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label>360° Verification (Video)</label>
                    <input type="file" name="video" accept="video/*" required>
                    <small style="color: #8b6f5b; font-size: 0.7rem; display: block; margin-top: 5px;">
                        *Show a 360 view and hold the item to verify authenticity.
                    </small>
                </div>

                <div class="form-group full-width">
                    <label>Provenance & Description</label>
                    <textarea name="description" required></textarea>
                </div>

                <div class="full-width">
                    <button type="submit" class="btn-primary sell-btn">Authorize Listing</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gavel. All rights reserved.</p>
    </footer>
    <script src="js/nav.js"></script>
    <script>
        document.querySelector('input[name="video"]').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // This provides immediate feedback to the Auctioneer
                alert("Verification Video Received: Our curators will review the 360° footage upon submission.");
            }
        });
    </script>
</body>
</html>
